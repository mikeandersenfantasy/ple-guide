<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Card - WrestleMania 42 Fan Guide</title>
<link rel="stylesheet" href="../css/styles.css">
<style>
/* Night grouping */
.night-group{margin-bottom:48px}
.night-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:14px;border-bottom:2px solid rgba(212,168,60,0.25)}
.night-header h2{font-size:1.6rem;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:var(--wm-gold)}
.night-header .night-date{font-size:0.95rem;color:var(--mid-gray);font-weight:600}
.night-header .night-badge{display:inline-block;padding:6px 16px;border-radius:50px;font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;background:rgba(212,168,60,0.12);color:var(--wm-gold);border:1px solid rgba(212,168,60,0.3)}
.night-header .night-badge.tbd{background:rgba(255,255,255,0.06);color:var(--mid-gray);border-color:rgba(255,255,255,0.15)}

/* Match rows */
.match-row{display:grid;grid-template-columns:1fr 1fr;background:var(--navy-light);border:1px solid rgba(255,255,255,0.06);border-radius:16px;margin-bottom:30px;overflow:hidden;transition:all var(--duration) var(--ease)}
.match-row:hover{border-color:var(--wm-gold);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.match-row.reverse .match-img-side{order:2}
.match-row.reverse .match-text-side{order:1}
.match-img-side{display:flex;flex-direction:column}
.match-img-side img{width:100%;display:block;object-fit:cover;flex:1;min-height:200px}
.match-predict{padding:16px 20px;background:rgba(0,0,0,0.3);text-align:center}
.match-predict h4{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--wm-gold);margin-bottom:10px}
.match-text-side{padding:20px 24px;display:flex;flex-direction:column;justify-content:space-evenly}
.match-text-side .match-section{margin-bottom:32px}
.match-text-side .match-section:last-child{margin-bottom:0}
.match-text-side .match-section h3{font-size:1.15rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--wm-gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.match-text-side .match-section h3::before{content:'';width:5px;height:20px;background:var(--wm-gold);border-radius:2px;flex-shrink:0}
.match-title-badge{display:inline-block;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 18px;border-radius:6px;background:rgba(212,168,60,0.12);color:var(--wm-gold);margin-bottom:10px}
.match-night-tag{display:inline-block;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:5px 12px;border-radius:50px;margin-left:10px;vertical-align:middle}
.match-night-tag.night-1{background:rgba(74,144,226,0.15);color:var(--face-blue);border:1px solid rgba(74,144,226,0.3)}
.match-night-tag.night-2{background:rgba(224,64,64,0.15);color:var(--heel-red);border:1px solid rgba(224,64,64,0.3)}
.match-night-tag.tbd{background:rgba(255,255,255,0.06);color:var(--mid-gray);border:1px solid rgba(255,255,255,0.12)}
.match-text-side .why-box{font-size:1.1rem;padding:14px;line-height:1.7}
.match-text-side .story-text{font-size:1.1rem;line-height:1.7;color:var(--mid-gray)}

/* Match count badge in hero */
.match-count{display:inline-block;padding:8px 20px;border-radius:50px;background:rgba(212,168,60,0.15);color:var(--wm-gold);font-weight:800;font-size:0.9rem;letter-spacing:1px;border:1px solid rgba(212,168,60,0.3);margin-top:12px}

@media(max-width:900px){
  .match-row,.match-row.reverse{grid-template-columns:1fr}
  .match-row.reverse .match-img-side{order:1}
  .match-row.reverse .match-text-side{order:2}
  .match-text-side{padding:24px}
  .match-img-side img{min-height:180px;max-height:280px}
}
@media(max-width:480px){
  .match-text-side{padding:16px 14px}
  .match-text-side .why-box{font-size:1rem;padding:12px;line-height:1.65}
  .match-text-side .story-text{font-size:1rem;line-height:1.65}
  .match-text-side .match-section h3{font-size:.85rem}
  .match-title-badge{font-size:.8rem;padding:6px 12px}
  .match-text-side .match-section{margin-bottom:20px}
  .night-header{flex-direction:column;align-items:flex-start;gap:8px}
  .night-header h2{font-size:1.2rem}
  .match-night-tag{margin-left:0;margin-top:6px;display:block;width:fit-content}
  .match-predict .prediction-btns{flex-direction:column;align-items:stretch}
  .match-predict .prediction-btn{width:100%;text-align:center}
}
.prediction-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.prediction-btn{flex:0 1 auto}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="../" class="nav-logo"><span style="letter-spacing:1px">WrestleMania</span> <span style="color:#D4A83C">42</span> <span style="color:#D4A83C">Guide</span></a>
    <div class="nav-links">
      <a href="../">Home</a>
      <a href="../matches/">Matches</a>
      <a href="../wrestlers/">Wrestlers</a>
      <a href="../videos/">Entrances</a>
      <a href="../legal/">Legal</a>
    </div>
    <button class="hamburger" aria-label="Menu">&#9776;</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero" style="padding:50px 30px 40px;background:linear-gradient(rgba(11,15,26,0.75),rgba(11,15,26,0.9)),url('https://www.wwe.com/f/styles/shows_header_xl/public/all/2025/03/20250321_WM41_Header--632082b0601412faa032bda3d82bd324.jpg') center/cover no-repeat">
  <div class="hero-label">WrestleMania 42</div>
  <h1>The Match <span style="color:#fff">Card</span></h1>
  <p class="hero-sub" id="hero-sub">Loading matches...</p>
</section>

<section class="section">
<div class="inner" id="matches-container">
  <!-- Matches rendered by JS -->
</div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>Made with <span class="heart">&#10084;</span> for the family &bull; WrestleMania 42 &bull; April 18-19, 2026 &bull; Las Vegas</p>
  <p>Data sourced from <a href="https://www.wwe.com/shows/wrestlemania" target="_blank" rel="noopener">WWE.com</a> and wrestling news outlets. Last updated March 2026.</p>
</footer>

<button class="scroll-top" id="scrollTop">&#8593;</button>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
(function() {
  const container = document.getElementById('matches-container');
  const heroSub = document.getElementById('hero-sub');
  const matches = MATCHES;

  // Update hero subtitle with match count
  heroSub.textContent = matches.length + ' confirmed match' + (matches.length !== 1 ? 'es' : '') + '. Scroll through to see the full storyline breakdown. Pick your winners!';

  // Check if any matches have nights assigned
  const hasNights = matches.some(m => m.night !== null);

  if (hasNights) {
    // Group matches by night
    const night1 = matches.filter(m => m.night === 1);
    const night2 = matches.filter(m => m.night === 2);
    const tbd = matches.filter(m => m.night === null);

    if (night1.length > 0) {
      container.innerHTML += buildNightSection(1, 'Saturday, April 18', night1);
    }
    if (night2.length > 0) {
      container.innerHTML += buildNightSection(2, 'Sunday, April 19', night2);
    }
    if (tbd.length > 0) {
      container.innerHTML += buildNightSection(null, 'To Be Announced', tbd);
    }
  } else {
    // No nights assigned yet — render all matches flat
    matches.forEach(function(match, i) {
      container.innerHTML += buildMatchRow(match, i);
    });
  }

  // Load saved predictions
  loadPredictions();

  // Bind prediction buttons
  container.addEventListener('click', function(e) {
    if (e.target.classList.contains('prediction-btn')) {
      var matchId = e.target.getAttribute('data-match');
      var wrestler = e.target.getAttribute('data-wrestler');
      savePrediction(matchId, wrestler);

      // Update UI
      var btns = container.querySelectorAll('.prediction-btn[data-match="' + matchId + '"]');
      btns.forEach(function(btn) { btn.classList.remove('selected'); });
      e.target.classList.add('selected');
    }
  });

  function buildNightSection(night, dateStr, nightMatches) {
    var nightLabel, badgeClass;
    if (night === 1) {
      nightLabel = 'Night 1';
      badgeClass = 'night-badge';
    } else if (night === 2) {
      nightLabel = 'Night 2';
      badgeClass = 'night-badge';
    } else {
      nightLabel = 'Night TBD';
      badgeClass = 'night-badge tbd';
    }

    var html = '<div class="night-group">';
    html += '<div class="night-header">';
    html += '<h2>' + nightLabel + '</h2>';
    html += '<span class="night-date">' + dateStr + '</span>';
    html += '</div>';

    nightMatches.forEach(function(match, i) {
      // Use global index for alternating layout
      var globalIdx = matches.indexOf(match);
      html += buildMatchRow(match, globalIdx);
    });

    html += '</div>';
    return html;
  }

  function getMatchAltText(match) {
    if (match.wrestler1 && match.wrestler2) {
      return WRESTLERS[match.wrestler1].name + ' vs ' + WRESTLERS[match.wrestler2].name;
    } else if (match.participants) {
      return match.participants.map(function(k) { return WRESTLERS[k].name; }).join(', ');
    } else if (match.teams) {
      return match.teams.map(function(t) { return t.name; }).join(' vs ');
    }
    return match.championship;
  }

  function buildMatchRow(match, index) {
    var isReverse = index % 2 !== 0;
    var matchKey = match.id.replace('-', '');

    // Night tag
    var nightTag = '';
    if (match.night === 1) {
      nightTag = '<span class="match-night-tag night-1">Night 1</span>';
    } else if (match.night === 2) {
      nightTag = '<span class="match-night-tag night-2">Night 2</span>';
    } else {
      nightTag = '<span class="match-night-tag tbd">Night TBD</span>';
    }

    var html = '<div class="match-row' + (isReverse ? ' reverse' : '') + '" id="' + match.id + '">';

    // Image side
    html += '<div class="match-img-side">';
    html += '<img src="' + match.bannerImg + '" alt="' + getMatchAltText(match) + '" loading="lazy">';
    html += '<div class="match-predict">';
    html += '<h4>Who Wins?</h4>';
    html += '<div class="prediction-btns">';
    match.predictions.forEach(function(pred) {
      html += '<button class="prediction-btn" data-match="' + matchKey + '" data-wrestler="' + pred.wrestler + '">' + pred.label + '</button>';
    });
    html += '</div></div></div>';

    // Text side
    html += '<div class="match-text-side">';
    html += '<span class="match-title-badge">' + match.championship + '</span>' + nightTag;

    html += '<div class="match-section">';
    html += '<h3>Why This Match Matters</h3>';
    html += '<div class="why-box">' + match.whyItMatters + '</div>';
    html += '</div>';

    html += '<div class="match-section">';
    html += '<h3>The Story So Far</h3>';
    html += '<div class="story-text">' + match.storySoFar + '</div>';
    html += '</div>';

    html += '</div>'; // match-text-side
    html += '</div>'; // match-row

    return html;
  }

  function savePrediction(matchId, wrestler) {
    var predictions = JSON.parse(localStorage.getItem('wm42-predictions') || '{}');
    predictions[matchId] = wrestler;
    localStorage.setItem('wm42-predictions', JSON.stringify(predictions));
  }

  function loadPredictions() {
    var predictions = JSON.parse(localStorage.getItem('wm42-predictions') || '{}');
    Object.keys(predictions).forEach(function(matchId) {
      var btns = container.querySelectorAll('.prediction-btn[data-match="' + matchId + '"]');
      btns.forEach(function(btn) {
        if (btn.getAttribute('data-wrestler') === predictions[matchId]) {
          btn.classList.add('selected');
        }
      });
    });
  }
})();
</script>
</body>
</html>
